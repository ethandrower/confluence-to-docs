<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>{{ heading }}</title>
<!--[if !mso]><!-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!--<![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#fafbfc; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; color:#0f172a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">

<!-- Preheader -->
<div style="display:none; max-height:0; overflow:hidden; mso-hide:all; font-size:1px; line-height:1px; color:#fafbfc; opacity:0;">
  {{ heading }} — {{ product_name }}.
</div>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#fafbfc" style="background-color:#fafbfc;">
  <tr>
    <td align="center" style="padding:56px 16px 40px 16px;">

      <!-- Card -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#ffffff" style="max-width:560px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:12px;">
        <!-- Logo -->
        <tr>
          <td align="left" style="padding:40px 44px 0 44px;">
            <span style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:22px; font-weight:600; color:#2d5296; letter-spacing:-0.015em; line-height:1;">
              <span style="font-weight:400; color:#8aa4cf;">[</span>cite<span style="font-weight:400; color:#8aa4cf;">]</span>med
            </span>
          </td>
        </tr>
        <tr>
          <td style="padding:28px 44px 8px 44px;">
            <h1 style="margin:0 0 16px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:24px; line-height:1.28; font-weight:700; color:#0f172a; letter-spacing:-0.02em;">
              {{ heading }}
            </h1>
            <p style="margin:0 0 24px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:15px; line-height:1.6; color:#334155;">
              {{ body }}
            </p>
          </td>
        </tr>

        {% if note %}
        <!-- Optional note (e.g. reviewer feedback) -->
        <tr>
          <td style="padding:0 44px 24px 44px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-left:3px solid #2d5296; background-color:#f1f5fb; border-radius:4px;">
              <tr>
                <td style="padding:12px 16px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:14px; line-height:1.55; color:#334155;">
                  {{ note }}
                </td>
              </tr>
            </table>
          </td>
        </tr>
        {% endif %}

        <!-- CTA -->
        <tr>
          <td align="left" style="padding:0 44px 32px 44px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td bgcolor="#2d5296" style="background-color:#2d5296; border-radius:6px; mso-padding-alt:0;">
                  <a href="{{ cta_url }}"
                     style="display:inline-block; padding:14px 28px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:15px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:6px; letter-spacing:-0.005em; mso-text-raise:2px;">
                    {{ cta_label }} &nbsp;&rarr;
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td style="padding:0 44px 32px 44px;">
            <p style="margin:0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:13px; line-height:1.5; color:#64748b;">
              Button not working?
              <a href="{{ cta_url }}" style="color:#2d5296; text-decoration:underline;">Open the portal</a>.
            </p>
          </td>
        </tr>
      </table>

      <!-- Footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px;">
        <tr>
          <td align="center" style="padding:28px 4px 0 4px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; line-height:1.6; color:#94a3b8; letter-spacing:0.01em;">
            {{ product_name }}<br>
            This is an automated message. Please do not reply.
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>

</body>
</html>
